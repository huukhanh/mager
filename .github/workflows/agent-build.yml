name: Agent

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: agent-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    env:
      CGO_ENABLED: "0"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod

      - name: Test
        run: make test

      - name: Build (linux + darwin, amd64 + arm64)
        run: make build-all

      - uses: actions/upload-artifact@v4
        with:
          name: mager-agent
          path: agent/bin/mager-agent-*

      # Tag pushes (v*) auto-publish a GitHub release with the binaries attached.
      # install.sh and the Worker /agent/<os>-<arch> redirect both consume this.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent/bin/mager-agent-linux-amd64
            agent/bin/mager-agent-linux-arm64
            agent/bin/mager-agent-darwin-amd64
            agent/bin/mager-agent-darwin-arm64
          generate_release_notes: true
          fail_on_unmatched_files: true
